<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="512" height="512">
  <!-- Rounded square background -->
  <rect x="0" y="0" width="100" height="100" rx="22" fill="#4F46E5"/>

  <!-- White clock face -->
  <circle cx="50" cy="50" r="33" fill="white"/>

  <!-- Cardinal tick marks -->
  <rect x="48.5" y="20" width="3" height="6" rx="1.5" fill="#CBD5E1"/>
  <rect x="48.5" y="74" width="3" height="6" rx="1.5" fill="#CBD5E1"/>
  <rect x="20" y="48.5" width="6" height="3" rx="1.5" fill="#CBD5E1"/>
  <rect x="74" y="48.5" width="6" height="3" rx="1.5" fill="#CBD5E1"/>

  <!-- Hour hand — pointing ~10 o'clock -->
  <line x1="50" y1="50" x2="36" y2="35" stroke="#4F46E5" stroke-width="5.5" stroke-linecap="round"/>

  <!-- Minute hand — pointing ~12 -->
  <line x1="50" y1="50" x2="50" y2="23" stroke="#4F46E5" stroke-width="4" stroke-linecap="round"/>

  <!-- Center boss -->
  <circle cx="50" cy="50" r="4" fill="#4F46E5"/>
</svg>
