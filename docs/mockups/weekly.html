<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Call It a Day — Weekly</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Inter:wght@400;500&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #F8FAFC;
      --surface:     #FFFFFF;
      --indigo:      #4F46E5;
      --indigo-dim:  #EEF2FF;
      --emerald:     #059669;
      --emerald-dim: #D1FAE5;
      --amber:       #D97706;
      --amber-dim:   #FEF3C7;
      --text-1:      #0F172A;
      --text-2:      #64748B;
      --text-3:      #94A3B8;
      --border:      #E2E8F0;
      --font-ui:     'Plus Jakarta Sans', sans-serif;
      --font-body:   'Inter', sans-serif;
      --font-mono:   'JetBrains Mono', monospace;
    }

    body {
      background: var(--bg);
      color: var(--text-1);
      font-family: var(--font-body);
      min-height: 100vh;
    }

    /* ── Nav ── */
    nav {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .wordmark {
      font-family: var(--font-ui);
      font-weight: 600;
      font-size: 15px;
      color: var(--text-1);
      letter-spacing: -0.01em;
    }
    .wordmark span { color: var(--indigo); }
    .nav-links { display: flex; gap: 4px; }
    .nav-link {
      font-family: var(--font-ui);
      font-size: 13px;
      font-weight: 500;
      color: var(--text-2);
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      border: none;
      background: none;
    }
    .nav-link:hover { color: var(--text-1); background: var(--bg); }
    .nav-link.active { color: var(--indigo); background: var(--indigo-dim); }
    nav .meta { font-size: 13px; color: var(--text-2); }

    /* ── Layout ── */
    .container {
      max-width: 720px;
      margin: 0 auto;
      padding: 32px 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }

    /* ── Card header ── */
    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 24px;
      border-bottom: 1px solid var(--border);
    }
    .section-header {
      font-family: var(--font-ui);
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-2);
    }
    .pagination {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .page-btn {
      font-family: var(--font-ui);
      font-size: 12px;
      font-weight: 500;
      color: var(--text-2);
      border: 1px solid var(--border);
      background: var(--surface);
      border-radius: 6px;
      padding: 4px 10px;
      cursor: pointer;
    }
    .page-btn:hover { color: var(--text-1); }
    .page-btn:disabled { opacity: 0.35; cursor: default; }
    .page-label { font-size: 12px; color: var(--text-3); }

    /* ── Status chip ── */
    .status-chip {
      font-family: var(--font-ui);
      font-size: 11px;
      font-weight: 500;
      padding: 2px 8px;
      border-radius: 20px;
      white-space: nowrap;
    }
    .status-chip.met    { background: var(--emerald-dim); color: var(--emerald); }
    .status-chip.banked { background: var(--emerald-dim); color: var(--emerald); }
    .status-chip.short  { background: var(--amber-dim);   color: var(--amber); }
    .status-chip.active { background: var(--indigo-dim);  color: var(--indigo); }

    /* ── Week row ── */
    .week-item { border-bottom: 1px solid var(--border); }
    .week-item:last-child { border-bottom: none; }

    .week-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 24px;
      cursor: pointer;
      user-select: none;
      transition: background 0.1s;
    }
    .week-row:hover { background: var(--bg); }
    .week-row.open  { background: var(--bg); }

    .week-range {
      font-family: var(--font-ui);
      font-size: 14px;
      font-weight: 500;
      color: var(--text-1);
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 1;
    }
    .week-range.current { color: var(--indigo); }
    .current-tag {
      font-size: 10px;
      font-weight: 600;
      color: var(--indigo);
      background: var(--indigo-dim);
      padding: 1px 6px;
      border-radius: 20px;
      font-family: var(--font-ui);
      letter-spacing: 0.02em;
    }
    .week-hours {
      font-family: var(--font-mono);
      font-size: 14px;
      font-weight: 600;
      color: var(--text-1);
    }
    .chevron {
      color: var(--text-3);
      font-size: 13px;
      transition: transform 0.2s;
      width: 16px;
      text-align: center;
    }
    .week-row.open .chevron { transform: rotate(90deg); }

    /* ── Muted hours (weekend) ── */
    .day-hours.muted { color: var(--text-3); }

    /* ── Accordion panel ── */
    .week-panel {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.25s ease;
      background: var(--bg);
      border-top: none;
    }
    .week-panel.open {
      max-height: 600px;
      border-top: 1px solid var(--border);
    }

    /* ── Day rows inside accordion ── */
    .day-item { border-bottom: 1px solid var(--border); }
    .day-item:last-child { border-bottom: none; }

    .day-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 11px 24px 11px 36px;
      cursor: pointer;
      transition: background 0.1s;
    }
    .day-row:hover { background: #F1F5F9; }
    .day-row.open  { background: #F1F5F9; }

    .day-label {
      font-family: var(--font-ui);
      font-size: 13px;
      font-weight: 500;
      color: var(--text-1);
      display: flex;
      align-items: center;
      gap: 6px;
      flex: 1;
    }
    .day-label.today { color: var(--indigo); }
    .day-date { font-size: 11px; color: var(--text-3); font-family: var(--font-body); }

    .day-hours {
      font-family: var(--font-mono);
      font-size: 13px;
      font-weight: 500;
      color: var(--text-1);
    }

    /* ── Day accordion panel ── */
    .day-panel {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.25s ease;
      background: var(--surface);
      border-top: none;
    }
    .day-panel.open {
      max-height: 800px;
      border-top: 1px solid var(--border);
    }
    .day-panel-inner { padding: 20px 24px 20px 36px; }

    .sessions-header {
      font-family: var(--font-ui);
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-2);
      margin-bottom: 8px;
    }

    /* ── Session rows ── */
    .session-list { display: flex; flex-direction: column; }
    .session-row {
      display: grid;
      grid-template-columns: 1fr auto auto auto;
      align-items: center;
      gap: 12px;
      padding: 11px 0;
      border-bottom: 1px solid var(--border);
    }
    .session-row:last-child { border-bottom: none; }
    .session-row.non-work .s-time { color: var(--text-3); }
    .session-row.non-work .s-dur  { color: var(--text-3); text-decoration: line-through; }
    .session-row.live {
      background: var(--indigo-dim);
      border-radius: 8px;
      padding: 11px 12px;
      margin: 0 -12px;
      border-bottom: none !important;
    }
    .session-row.live .s-time { color: var(--indigo); font-weight: 500; }
    .session-row.live .s-dur  { color: var(--indigo); }

    .s-time { font-family: var(--font-mono); font-size: 13px; color: var(--text-2); }
    .s-computer { font-size: 12px; color: var(--text-3); }
    .s-dur {
      font-family: var(--font-mono);
      font-size: 13px;
      font-weight: 500;
      color: var(--text-1);
      min-width: 48px;
      text-align: right;
    }
    .work-btn {
      font-family: var(--font-ui);
      font-size: 11px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 20px;
      border: none;
      cursor: pointer;
    }
    .work-btn.is-work    { background: var(--indigo-dim); color: var(--indigo); }
    .work-btn.is-nonwork { background: var(--border);     color: var(--text-2); }
    .live-badge {
      background: var(--indigo);
      color: #fff;
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 20px;
      font-family: var(--font-ui);
    }
    .manual-tag {
      font-size: 11px;
      font-weight: 500;
      color: var(--text-2);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 2px 8px;
      font-family: var(--font-ui);
    }
    .gap-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 0;
    }
    .gap-line  { flex: 1; height: 1px; background: var(--border); }
    .gap-label { font-size: 11px; color: var(--text-3); font-family: var(--font-ui); white-space: nowrap; }
    .session-note {
      padding: 0 0 9px;
      border-bottom: 1px solid var(--border);
      margin-top: -4px;
    }
    .session-note:last-child { border-bottom: none; }
    .note-input {
      font-family: var(--font-body);
      font-size: 12px;
      color: var(--text-3);
      background: none;
      border: none;
      outline: none;
      width: 100%;
    }
    .note-input::placeholder { color: var(--text-3); }
    .note-input:focus { color: var(--text-2); }
  </style>
</head>
<body>

<nav>
  <div class="wordmark">Call It a <span>Day</span></div>
  <div class="nav-links">
    <button class="nav-link" onclick="goHome()">Dashboard</button>

<div class="container" id="app"></div>

<script>
  const WE = { status:'weekend', statusLabel:'', hours:'—' }
  const WEEKS = [
    { label:'May 25 – May 31', current:true, total:'38h 27m', status:'active', statusLabel:'in progress', days:[
      { name:'Sat', date:'May 31', ...WE },

      { name:'Mon', date:'May 12', hours:'8h 00m', status:'met', statusLabel:'on the dot' },

    { label:'May 4 – May 10', total:'37h 30m', status:'short', statusLabel:'–2h 30m', days:[
      { name:'Sat', date:'May 10', ...WE },
      { name:'Fri', date:'May 9',  hours:'8h 00m', status:'met',   statusLabel:'on the dot' },
      { name:'Thu', date:'May 8',  hours:'8h 00m', status:'met',   statusLabel:'on the dot' },
      { name:'Wed', date:'May 7',  hours:'7h 30m', status:'short', statusLabel:'–30m' },

      { name:'Mon', date:'May 5',  hours:'8h 00m', status:'met',   statusLabel:'on the dot' },

    ]},
    { label:'Apr 27 – May 3', total:'42h 15m', status:'banked', statusLabel:'+2h 15m banked', days:[
      { name:'Sat', date:'May 3',  ...WE },
      { name:'Fri', date:'May 2',  hours:'8h 00m', status:'met',    statusLabel:'on the dot' },
      { name:'Thu', date:'May 1',  hours:'8h 45m', status:'banked', statusLabel:'+45m' },
      { name:'Wed', date:'Apr 30', hours:'8h 00m', status:'met',    statusLabel:'on the dot' },
      { name:'Tue', date:'Apr 29', hours:'9h 00m', status:'banked', statusLabel:'+1h 00m' },
      { name:'Mon', date:'Apr 28', hours:'8h 30m', status:'banked', statusLabel:'+30m' },
      { name:'Sun', date:'Apr 27', ...WE },
    ]},
    { label:'Apr 20 – Apr 26', total:'38h 00m', status:'short', statusLabel:'–2h 00m', days:[
      { name:'Sat', date:'Apr 26', ...WE },
      { name:'Fri', date:'Apr 25', hours:'8h 00m', status:'met',   statusLabel:'on the dot' },
      { name:'Thu', date:'Apr 24', hours:'8h 00m', status:'met',   statusLabel:'on the dot' },

      { name:'Fri', date:'Apr 18', hours:'8h 00m', status:'met',    statusLabel:'on the dot' },
      { name:'Thu', date:'Apr 17', hours:'8h 00m', status:'met',    statusLabel:'on the dot' },
      { name:'Wed', date:'Apr 16', hours:'8h 30m', status:'banked', statusLabel:'+30m' },

    ]},
    { label:'Apr 6 – Apr 12', total:'39h 00m', status:'short', statusLabel:'–1h 00m', days:[
      { name:'Sat', date:'Apr 12', ...WE },

      { name:'Thu', date:'Apr 10', hours:'8h 00m', status:'met',   statusLabel:'on the dot' },
      { name:'Wed', date:'Apr 9',  hours:'8h 00m', status:'met',   statusLabel:'on the dot' },

      { name:'Mon', date:'Apr 7',  hours:'8h 00m', status:'met',   statusLabel:'on the dot' },
      { name:'Sun', date:'Apr 6',  ...WE },
    ]},
    { label:'Mar 30 – Apr 5', total:'41h 00m', status:'banked', statusLabel:'+1h banked', days:[
      { name:'Sat', date:'Apr 5',  ...WE },
      { name:'Fri', date:'Apr 4',  hours:'8h 00m', status:'met',    statusLabel:'on the dot' },
      { name:'Thu', date:'Apr 3',  hours:'8h 00m', status:'met',    statusLabel:'on the dot' },

      { name:'Mon', date:'Mar 31', hours:'8h 00m', status:'met',    statusLabel:'on the dot' },

    ]},
    { label:'Mar 23 – Mar 29', total:'40h 00m', status:'met', statusLabel:'goal met', days:[

      { name:'Fri', date:'Mar 28', hours:'8h 00m', status:'met', statusLabel:'on the dot' },

    { label:'Mar 16 – Mar 22', total:'37h 00m', status:'short', statusLabel:'–3h 00m', days:[

      { name:'Fri', date:'Mar 21', hours:'8h 00m', status:'met',   statusLabel:'on the dot' },

      { name:'Wed', date:'Mar 19', hours:'8h 00m', status:'met',   statusLabel:'on the dot' },
      { name:'Tue', date:'Mar 18', hours:'5h 00m', status:'short', statusLabel:'–3h 00m' },
      { name:'Mon', date:'Mar 17', hours:'8h 00m', status:'met',   statusLabel:'on the dot' },
      { name:'Sun', date:'Mar 16', ...WE },
    ]},
    { label:'Mar 9 – Mar 15', total:'40h 00m', status:'met', statusLabel:'goal met', days:[
      { name:'Sat', date:'Mar 15', ...WE },
      { name:'Fri', date:'Mar 14', hours:'8h 00m', status:'met', statusLabel:'on the dot' },
      { name:'Thu', date:'Mar 13', hours:'8h 00m', status:'met', statusLabel:'on the dot' },
      { name:'Wed', date:'Mar 12', hours:'8h 00m', status:'met', statusLabel:'on the dot' },
      { name:'Tue', date:'Mar 11', hours:'8h 00m', status:'met', statusLabel:'on the dot' },
      { name:'Mon', date:'Mar 10', hours:'8h 00m', status:'met', statusLabel:'on the dot' },
      { name:'Sun', date:'Mar 9',  ...WE },
    ]},
  ]

  const PER_PAGE = 10
  let page = 0
  let openWeek = null  // week index
  let openDay  = null  // 'weekIdx-dayIdx' string

  function render() {
    document.getElementById('app').innerHTML = renderWeeks()
  }

  // ── Weeks accordion ───────────────────────────────────────────────────────

  function renderWeeks() {
    const start  = page * PER_PAGE
    const slice  = WEEKS.slice(start, start + PER_PAGE)
    const hasPrev = page > 0
    const hasNext = start + PER_PAGE < WEEKS.length

    const items = slice.map((w, localIdx) => {
      const globalIdx = start + localIdx
      const isOpen = openWeek === globalIdx

      const dayRows = w.days.map((d, di) => {
        const dayKey = `${globalIdx}-${di}`
        const isDayOpen = openDay === dayKey
        const sessions = d.today ? `
          <div class="session-row live">
            <span class="s-time">1:00 PM – now &nbsp;<span class="live-badge">Live</span></span>
            <span class="s-computer">alan-windows</span>
            <span class="s-dur">2h 42m</span>
            <button class="work-btn is-work" onclick="toggleWork(this)">Work</button>
          </div>
          <div class="session-note"><input class="note-input" type="text" placeholder="Add note…"></div>
          <div class="session-row">
            <span class="s-time">12:45 PM – 1:30 PM</span>
            <span class="s-computer">alan-claude</span>
            <span class="s-dur">45m</span>
            <button class="work-btn is-work" onclick="toggleWork(this)">Work</button>
          </div>
          <div class="session-note"><input class="note-input" type="text" placeholder="Add note…"></div>
          <div class="gap-row"><div class="gap-line"></div><span class="gap-label">45m break</span><div class="gap-line"></div></div>
          <div class="session-row">
            <span class="s-time">8:00 AM – 12:00 PM</span>
            <span class="s-computer">alan-claude</span>
            <span class="s-dur">4h 00m</span>
            <button class="work-btn is-work" onclick="toggleWork(this)">Work</button>
          </div>
          <div class="session-note"><input class="note-input" type="text" value="Morning deep work block"></div>
        ` : `
          <div class="session-row">
            <span class="s-time">1:00 PM – 5:00 PM</span>
            <span class="s-computer">alan-claude</span>
            <span class="s-dur">4h 00m</span>
            <button class="work-btn is-work" onclick="toggleWork(this)">Work</button>
          </div>
          <div class="session-note"><input class="note-input" type="text" placeholder="Add note…"></div>
          <div class="gap-row"><div class="gap-line"></div><span class="gap-label">1h break</span><div class="gap-line"></div></div>
          <div class="session-row">
            <span class="s-time">8:00 AM – 12:00 PM</span>
            <span class="s-computer">alan-claude</span>
            <span class="s-dur">4h 00m</span>
            <button class="work-btn is-work" onclick="toggleWork(this)">Work</button>
          </div>
          <div class="session-note"><input class="note-input" type="text" value="Morning standup + sprint planning"></div>
        `
        const isWeekend = d.status === 'weekend'
        return `
        <div class="day-item">
          <div class="day-row ${isDayOpen ? 'open' : ''} ${isWeekend ? 'no-data' : ''}"
               ${isWeekend ? '' : `onclick="toggleDay('${dayKey}')"`}
               style="${isWeekend ? 'cursor:default;' : ''}">
            <div class="day-label ${d.today ? 'today' : ''}" style="${isWeekend ? 'color:var(--text-3);' : ''}">
              ${d.name} <span class="day-date">${d.date}</span>
            </div>
            ${isWeekend ? '' : `<span class="status-chip ${d.status}">${d.statusLabel}</span>`}
            <span class="day-hours ${isWeekend ? 'muted' : ''}">${d.hours}</span>
          </div>
          <div class="day-panel ${isDayOpen ? 'open' : ''}" id="daypanel-${dayKey}">
            <div class="day-panel-inner">
              <div class="session-list">${sessions}</div>
            </div>
          </div>
        </div>`
      }).join('')

      return `
        <div class="week-item">
          <div class="week-row ${isOpen ? 'open' : ''}" onclick="toggleWeek(${globalIdx})">
            <div class="week-range ${w.current ? 'current' : ''}">
              ${w.label}
              ${w.current ? '<span class="current-tag">current</span>' : ''}
            </div>
            <span class="status-chip ${w.status}">${w.statusLabel}</span>
            <span class="week-hours">${w.total}</span>
            <span class="chevron">›</span>
          </div>
          <div class="week-panel ${isOpen ? 'open' : ''}" id="panel-${globalIdx}">
            ${dayRows}
          </div>
        </div>`
    }).join('')

    const paginationHtml = (hasPrev || hasNext) ? `
      <div class="pagination">
        <button class="page-btn" onclick="changePage(-1)" ${!hasPrev ? 'disabled' : ''}>← Newer</button>
        <span class="page-label">${page + 1} of ${Math.ceil(WEEKS.length / PER_PAGE)}</span>
        <button class="page-btn" onclick="changePage(1)"  ${!hasNext ? 'disabled' : ''}>Older →</button>
      </div>` : ''

    return `
      <div class="card">
        <div class="card-header">
          <div class="section-header">Weeks</div>
          ${paginationHtml}
        </div>
        ${items}
      </div>`
  }

  // ── Actions ───────────────────────────────────────────────────────────────

  function toggleWeek(idx) {
    openWeek = openWeek === idx ? null : idx
    openDay  = null
    render()
  }

  function toggleDay(key) {
    openDay = openDay === key ? null : key
    render()
  }

  function changePage(dir) {
    page     = Math.max(0, Math.min(Math.ceil(WEEKS.length / PER_PAGE) - 1, page + dir))
    openWeek = null
    openDay  = null
    render()
  }

  function goHome() { window.location.href = 'dashboard.html' }

  function toggleWork(btn) {
    const row = btn.closest('.session-row')
    if (btn.classList.contains('is-work')) {
      btn.classList.replace('is-work', 'is-nonwork')
      row.classList.add('non-work')
    } else {
      btn.classList.replace('is-nonwork', 'is-work')
      row.classList.remove('non-work')
    }
  }

  render()
</script>
</body>
</html>
